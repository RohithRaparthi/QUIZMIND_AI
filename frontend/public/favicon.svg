<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <!-- Gradients -->
    <linearGradient id="brain-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c3aed" /> <!-- Primary Violet -->
      <stop offset="50%" stop-color="#3b82f6" /> <!-- Blue -->
      <stop offset="100%" stop-color="#06b6d4" /> <!-- Cyan -->
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.3" />
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0" />
    </radialGradient>
    <!-- Glow Filter -->
    <filter id="neon-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  
  <!-- Outer Glow -->
  <circle cx="50" cy="50" r="45" fill="url(#glow)" />
  
  <!-- Outer Tech Ring -->
  <circle cx="50" cy="50" r="42" fill="none" stroke="url(#brain-grad)" stroke-width="1.5" stroke-dasharray="10 5 2 5" stroke-opacity="0.4" />
  
  <!-- Brain/Circuit Nodes and Connections -->
  <g filter="url(#neon-glow)">
    <!-- Central Brain Stem / Core -->
    <path d="M50,25 C45,25 35,30 35,42 C35,54 45,58 50,65 C55,58 65,54 65,42 C65,30 55,25 50,25 Z" fill="none" stroke="url(#brain-grad)" stroke-width="2.5" />
    <path d="M50,28 C47,32 40,36 40,42 C40,48 45,52 50,58 C55,52 60,48 60,42 C60,36 53,32 50,28 Z" fill="none" stroke="url(#brain-grad)" stroke-width="1.5" stroke-opacity="0.7" />
    
    <!-- Central Stem Line -->
    <line x1="50" y1="25" x2="50" y2="65" stroke="url(#brain-grad)" stroke-width="2" />
    
    <!-- Circuit connection paths (Left Hemisphere) -->
    <path d="M50,32 C42,32 38,38 38,42" fill="none" stroke="url(#brain-grad)" stroke-width="1.5" />
    <path d="M50,42 C42,42 32,46 30,52" fill="none" stroke="url(#brain-grad)" stroke-width="1.5" />
    <path d="M50,52 C45,55 38,58 38,62" fill="none" stroke="url(#brain-grad)" stroke-width="1.5" stroke-dasharray="2 2" />
    
    <!-- Circuit connection paths (Right Hemisphere) -->
    <path d="M50,32 C58,32 62,38 62,42" fill="none" stroke="url(#brain-grad)" stroke-width="1.5" />
    <path d="M50,42 C58,42 68,46 70,52" fill="none" stroke="url(#brain-grad)" stroke-width="1.5" />
    <path d="M50,52 C55,55 62,58 62,62" fill="none" stroke="url(#brain-grad)" stroke-width="1.5" stroke-dasharray="2 2" />
    
    <!-- Nodes (Neurons) -->
    <!-- Core Center -->
    <circle cx="50" cy="25" r="3.5" fill="#06b6d4" />
    <circle cx="50" cy="42" r="3" fill="#3b82f6" />
    <circle cx="50" cy="65" r="3.5" fill="#7c3aed" />
    
    <!-- Left nodes -->
    <circle cx="35" cy="42" r="3.5" fill="#7c3aed" />
    <circle cx="38" cy="32" r="2.5" fill="#06b6d4" />
    <circle cx="30" cy="52" r="3" fill="#3b82f6" />
    <circle cx="38" cy="62" r="2" fill="#06b6d4" />
    
    <!-- Right nodes -->
    <circle cx="65" cy="42" r="3.5" fill="#7c3aed" />
    <circle cx="62" cy="32" r="2.5" fill="#06b6d4" />
    <circle cx="70" cy="52" r="3" fill="#3b82f6" />
    <circle cx="62" cy="62" r="2" fill="#06b6d4" />
    
    <!-- Synaptic spark / cross connections -->
    <line x1="35" y1="42" x2="50" y2="42" stroke="#3b82f6" stroke-width="1" stroke-opacity="0.5" />
    <line x1="65" y1="42" x2="50" y2="42" stroke="#3b82f6" stroke-width="1" stroke-opacity="0.5" />
    <line x1="30" y1="52" x2="50" y2="65" stroke="#7c3aed" stroke-width="0.8" stroke-opacity="0.4" />
    <line x1="70" y1="52" x2="50" y2="65" stroke="#7c3aed" stroke-width="0.8" stroke-opacity="0.4" />
  </g>
</svg>